---
- name: Sync Semaphore Inventory from production-hosts.ini
  hosts: localhost
  connection: local
  gather_facts: no
  
  tasks:
    - name: Verify required variables are set
      assert:
        that:
          - semaphore_password is defined
          - semaphore_password | length > 0
        fail_msg: "SEMAPHORE_PASSWORD environment variable must be set"
    
    - name: Get repository root directory
      command: git rev-parse --show-toplevel
      register: repo_root
      changed_when: false
      
    - name: Set inventory file path
      set_fact:
        inventory_file: "{{ repo_root.stdout }}/inventory/production-hosts.ini"
        
    - name: Read inventory file
      slurp:
        src: "{{ inventory_file }}"
      register: inventory_content

    - name: Login to Semaphore
      uri:
        url: "{{ semaphore_url | default('https://ansible.cloudigan.net') }}/api/auth/login"
        method: POST
        body_format: json
        body:
          auth: "{{ semaphore_user | default('admin') }}"
          password: "{{ semaphore_password }}"
        validate_certs: yes
        status_code: 204
      register: login_result

    - name: Get existing inventories
      uri:
        url: "{{ semaphore_url | default('https://ansible.cloudigan.net') }}/api/project/{{ semaphore_project_id | default('1') }}/inventory"
        method: GET
        validate_certs: yes
        headers:
          Cookie: "{{ login_result.set_cookie }}"
      register: inventories

    - name: Find Production Hosts inventory ID
      set_fact:
        inventory_id: "{{ item.id }}"
      loop: "{{ inventories.json }}"
      when: item.name == "Production Hosts"
      no_log: true

    - name: Get SSH keys
      uri:
        url: "{{ semaphore_url | default('https://ansible.cloudigan.net') }}/api/project/{{ semaphore_project_id | default('1') }}/keys"
        method: GET
        validate_certs: yes
        headers:
          Cookie: "{{ login_result.set_cookie }}"
      register: ssh_keys

    - name: Find SSH key ID
      set_fact:
        ssh_key_id: "{{ ssh_keys.json[0].id }}"
      when: ssh_keys.json | length > 0

    - name: Build JSON body
      set_fact:
        json_body: |
          {
            "id": {{ inventory_id | int }},
            "name": "Production Hosts",
            "project_id": {{ semaphore_project_id | default('1') | int }},
            "inventory": {{ (inventory_content.content | b64decode) | to_json }},
            "ssh_key_id": {{ ssh_key_id | int }},
            "type": "static"
          }

    - name: Update inventory
      uri:
        url: "{{ semaphore_url | default('https://ansible.cloudigan.net') }}/api/project/{{ semaphore_project_id | default('1') }}/inventory/{{ inventory_id }}"
        method: PUT
        body: "{{ json_body }}"
        body_format: raw
        validate_certs: yes
        status_code: 204
        headers:
          Content-Type: "application/json"
          Cookie: "{{ login_result.set_cookie }}"
      register: update_result

    - name: Inventory sync complete
      debug:
        msg: "✅ Successfully updated Semaphore inventory 'Production Hosts' with {{ inventory_content.content | b64decode | regex_findall('ansible_host=') | length }} hosts"

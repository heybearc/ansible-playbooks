---
- name: Deploy Proxmox LXC Container with Full Automation
  hosts: localhost
  gather_facts: no
  vars:
    # Proxmox settings
    proxmox_host: "prox"
    proxmox_node: "prox"
    
    # Network settings
    gateway: "10.92.3.1"
    subnet: "24"
    nameserver: "10.92.0.10"
    searchdomain: "cloudigan.net"
    
    # Default container settings
    default_memory: 2048
    default_cores: 2
    default_disk: 32
    default_template: "local:vztmpl/ubuntu-22.04-standard_22.04-1_amd64.tar.zst"
    
    # Integration endpoints
    netbox_url: "http://10.92.3.18"
    netbox_token: "a7b0a8384c7c8c47f599d43731f1aa59f138c809"
    npm_url: "http://10.92.3.3:81"
    npm_email: "admin@cloudigan.com"
    npm_password: "HlZDa2@rd*mivNrl5kqQ"
    
    # CTID ranges by function
    ctid_ranges:
      bot: { min: 100, max: 109 }
      dev: { min: 110, max: 119 }
      media: { min: 120, max: 129 }
      core: { min: 130, max: 139 }
      network: { min: 140, max: 149 }
      monitoring: { min: 150, max: 159 }
      storage: { min: 160, max: 169 }
      security: { min: 170, max: 179 }
      utility: { min: 180, max: 189 }
  
  tasks:
    - name: Validate required variables
      assert:
        that:
          - container_name is defined
          - container_function is defined
          - container_ip is defined
        fail_msg: "Required variables: container_name, container_function, container_ip"
    
    - name: Validate container function
      assert:
        that:
          - container_function in ctid_ranges.keys()
        fail_msg: "Invalid function. Must be one of: {{ ctid_ranges.keys() | join(', ') }}"
    
    - name: Set container defaults
      set_fact:
        memory: "{{ container_memory | default(default_memory) }}"
        cores: "{{ container_cores | default(default_cores) }}"
        disk: "{{ container_disk | default(default_disk) }}"
        template: "{{ container_template | default(default_template) }}"
        privileged: "{{ container_privileged | default(false) }}"
        
    - name: Get list of existing CTIDs
      shell: ssh {{ proxmox_host }} "pct list | awk 'NR>1 {print $1}'"
      register: existing_ctids
      changed_when: false
      
    - name: Auto-assign CTID if not provided
      block:
        - name: Find available CTID in range
          set_fact:
            container_ctid: "{{ item }}"
          loop: "{{ range(ctid_ranges[container_function].min, ctid_ranges[container_function].max + 1) | list }}"
          when: 
            - container_ctid is not defined
            - item | string not in existing_ctids.stdout_lines
          loop_control:
            label: "Checking CTID {{ item }}"
          
        - name: Verify CTID was assigned
          assert:
            that:
              - container_ctid is defined
            fail_msg: "No available CTID in {{ container_function }} range ({{ ctid_ranges[container_function].min }}-{{ ctid_ranges[container_function].max }})"
      when: container_ctid is not defined
    
    - name: Display deployment plan
      debug:
        msg:
          - "=== Container Deployment Plan ==="
          - "Name: {{ container_name }}"
          - "CTID: {{ container_ctid }}"
          - "Function: {{ container_function }}"
          - "IP: {{ container_ip }}/{{ subnet }}"
          - "Memory: {{ memory }}MB"
          - "Cores: {{ cores }}"
          - "Disk: {{ disk }}GB"
          - "Privileged: {{ privileged }}"
          - "Template: {{ template }}"
    
    - name: Determine bridge based on IP subnet
      set_fact:
        bridge: "{{ 'vmbr0923' if container_ip.startswith('10.92.3.') else 'vmbr0' }}"
    
    - name: Create LXC container on Proxmox
      shell: |
        ssh {{ proxmox_host }} "pct create {{ container_ctid }} {{ template }} \
          --hostname {{ container_name }} \
          --memory {{ memory }} \
          --cores {{ cores }} \
          --rootfs hdd-pool:{{ disk }} \
          --net0 name=eth0,bridge={{ bridge }},ip={{ container_ip }}/{{ subnet }},gw={{ gateway }} \
          --nameserver {{ nameserver }} \
          --searchdomain {{ searchdomain }} \
          --onboot 1 \
          --start 1 \
          {% if privileged %}--unprivileged 0{% else %}--unprivileged 1{% endif %} \
          --features nesting=1"
      register: create_result
      
    - name: Wait for container to start
      wait_for:
        timeout: 30
      delegate_to: localhost
      
    - name: Verify container is running
      shell: ssh {{ proxmox_host }} "pct status {{ container_ctid }}"
      register: container_status
      failed_when: "'running' not in container_status.stdout"
      
    - name: Register container in Netbox
      uri:
        url: "{{ netbox_url }}/api/virtualization/virtual-machines/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ container_name }}"
          status: "active"
          cluster: 1
          role: 2
          platform: 2
          vcpus: "{{ cores }}"
          memory: "{{ memory }}"
          disk: "{{ disk }}"
          comments: "Function: {{ container_function }}, CTID: {{ container_ctid }}"
          custom_fields:
            ctid: "{{ container_ctid }}"
        status_code: [201, 400]
        validate_certs: no
      register: netbox_result
      when: skip_netbox is not defined or not skip_netbox
      ignore_errors: yes
      
    - name: Check if VM exists in Netbox
      uri:
        url: "{{ netbox_url }}/api/virtualization/virtual-machines/?name={{ container_name }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: no
      register: existing_vm
      when: skip_netbox is not defined or not skip_netbox
      ignore_errors: yes
      
    - name: Create VM in Netbox (if not exists)
      uri:
        url: "{{ netbox_url }}/api/virtualization/virtual-machines/"
        method: POST
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          name: "{{ container_name }}"
          status: "active"
          cluster: 1
          site: 2
          vcpus: "{{ container_cores }}"
          memory: "{{ container_memory }}"
          disk: "{{ container_disk }}"
          comments: "MSP Platform - CT{{ container_ctid }} - {{ container_function }}"
        status_code: [201, 400]
        validate_certs: no
      when: 
        - skip_netbox is not defined or not skip_netbox
        - existing_vm is defined
        - existing_vm.json.count == 0
      register: netbox_create
      ignore_errors: yes
      
    - name: Update existing VM in Netbox
      uri:
        url: "{{ netbox_url }}/api/virtualization/virtual-machines/{{ existing_vm.json.results[0].id }}/"
        method: PATCH
        headers:
          Authorization: "Token {{ netbox_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          vcpus: "{{ container_cores }}"
          memory: "{{ container_memory }}"
          disk: "{{ container_disk }}"
          comments: "MSP Platform - CT{{ container_ctid }} - {{ container_function }}"
        status_code: 200
        validate_certs: no
      when:
        - skip_netbox is not defined or not skip_netbox
        - existing_vm is defined
        - existing_vm.json.count > 0
      register: netbox_update
      ignore_errors: yes
      
    - name: Login to NPM
      uri:
        url: "{{ npm_url }}/api/tokens"
        method: POST
        body_format: json
        body:
          identity: "{{ npm_email }}"
          secret: "{{ npm_password }}"
        status_code: 200
        validate_certs: no
      register: npm_login
      when:
        - container_domain is defined
        - skip_npm is not defined or not skip_npm
      ignore_errors: yes
      
    - name: Check if NPM proxy exists
      uri:
        url: "{{ npm_url }}/api/nginx/proxy-hosts"
        method: GET
        headers:
          Authorization: "Bearer {{ npm_login.json.token }}"
        validate_certs: no
      register: existing_proxies
      when:
        - container_domain is defined
        - skip_npm is not defined or not skip_npm
        - npm_login is defined
        - npm_login.json is defined
        - npm_login.json.token is defined
      ignore_errors: yes
      
    - name: Find existing proxy for domain
      set_fact:
        existing_proxy: "{{ existing_proxies.json | selectattr('domain_names', 'contains', container_domain) | list | first | default(none) }}"
      when:
        - container_domain is defined
        - skip_npm is not defined or not skip_npm
        - existing_proxies is defined
        - existing_proxies.json is defined
      ignore_errors: yes
      
    - name: Create NPM proxy host (if not exists)
      uri:
        url: "{{ npm_url }}/api/nginx/proxy-hosts"
        method: POST
        headers:
          Authorization: "Bearer {{ npm_login.json.token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          domain_names:
            - "{{ container_domain }}"
          forward_scheme: "{{ 'https' if container_ssl | default(false) else 'http' }}"
          forward_host: "{{ container_ip }}"
          forward_port: "{{ container_port | default(80) }}"
          access_list_id: 0
          certificate_id: 0
          ssl_forced: false
          caching_enabled: false
          block_exploits: true
          advanced_config: ""
          meta:
            letsencrypt_agree: false
            dns_challenge: false
          allow_websocket_upgrade: true
          http2_support: true
          hsts_enabled: false
          hsts_subdomains: false
        status_code: [201, 400]
        validate_certs: no
      when:
        - container_domain is defined
        - skip_npm is not defined or not skip_npm
        - npm_login is defined
        - npm_login.json is defined
        - npm_login.json.token is defined
        - existing_proxy is not defined or existing_proxy is none
      register: npm_create
      ignore_errors: yes
      
    - name: Update NPM proxy host (if exists)
      uri:
        url: "{{ npm_url }}/api/nginx/proxy-hosts/{{ existing_proxy.id }}"
        method: PUT
        headers:
          Authorization: "Bearer {{ npm_login.json.token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          domain_names:
            - "{{ container_domain }}"
          forward_scheme: "{{ 'https' if container_ssl | default(false) else 'http' }}"
          forward_host: "{{ container_ip }}"
          forward_port: "{{ container_port | default(80) }}"
          access_list_id: 0
          certificate_id: 0
          ssl_forced: false
          caching_enabled: false
          block_exploits: true
          advanced_config: ""
          meta:
            letsencrypt_agree: false
            dns_challenge: false
          allow_websocket_upgrade: true
          http2_support: true
          hsts_enabled: false
          hsts_subdomains: false
        status_code: 200
        validate_certs: no
      when:
        - container_domain is defined
        - skip_npm is not defined or not skip_npm
        - npm_login is defined
        - npm_login.json is defined
        - npm_login.json.token is defined
        - existing_proxy is defined
        - existing_proxy is not none
      register: npm_update
      ignore_errors: yes
      
    - name: Add internal DNS record to Windows DC-01
      shell: |
        ssh dc-01 "powershell -Command \"Add-DnsServerResourceRecordA -Name {{ container_name }} -ZoneName {{ searchdomain }} -IPv4Address {{ container_ip }} -CreatePtr -ErrorAction SilentlyContinue\""
      when: skip_dns is not defined or not skip_dns
      ignore_errors: yes
      
    - name: Add DNS record for FQDN to NPM (if domain specified)
      shell: |
        ssh dc-01 "powershell -Command \"Add-DnsServerResourceRecordA -Name {{ container_domain.split('.')[0] }} -ZoneName {{ searchdomain }} -IPv4Address 10.92.3.3 -CreatePtr -ErrorAction SilentlyContinue\""
      when: 
        - container_domain is defined
        - skip_dns is not defined or not skip_dns
      ignore_errors: yes
      
    - name: Install node_exporter for monitoring
      shell: |
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'apt-get update -qq && apt-get install -y -qq wget tar unzip > /dev/null 2>&1'"
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'cd /tmp && wget -q https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz && tar xzf node_exporter-1.7.0.linux-amd64.tar.gz && mv node_exporter-1.7.0.linux-amd64/node_exporter /usr/local/bin/ && rm -rf node_exporter-1.7.0*'"
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'cat > /etc/systemd/system/node_exporter.service << \"EOFSERVICE\"
        [Unit]
        Description=Node Exporter
        After=network.target
        
        [Service]
        Type=simple
        ExecStart=/usr/local/bin/node_exporter
        Restart=always
        
        [Install]
        WantedBy=multi-user.target
        EOFSERVICE'"
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'systemctl daemon-reload && systemctl enable node_exporter && systemctl start node_exporter'"
      when: skip_monitoring is not defined or not skip_monitoring
      ignore_errors: yes
      
    - name: Install promtail for log shipping
      shell: |
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'cd /tmp && wget -q https://github.com/grafana/loki/releases/download/v2.9.3/promtail-linux-amd64.zip && unzip -q promtail-linux-amd64.zip && mv promtail-linux-amd64 /usr/local/bin/promtail && chmod +x /usr/local/bin/promtail && rm promtail-linux-amd64.zip'"
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'mkdir -p /etc/promtail && cat > /etc/promtail/config.yml << \"EOFCONFIG\"
        server:
          http_listen_port: 9080
          grpc_listen_port: 0
        
        positions:
          filename: /tmp/positions.yaml
        
        clients:
          - url: http://10.92.3.2:3100/loki/api/v1/push
        
        scrape_configs:
          - job_name: system
            static_configs:
              - targets:
                  - localhost
                labels:
                  job: varlogs
                  host: {{ container_name }}
                  __path__: /var/log/*log
        EOFCONFIG'"
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'cat > /etc/systemd/system/promtail.service << \"EOFSERVICE\"
        [Unit]
        Description=Promtail
        After=network.target
        
        [Service]
        Type=simple
        ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/config.yml
        Restart=always
        
        [Install]
        WantedBy=multi-user.target
        EOFSERVICE'"
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'systemctl daemon-reload && systemctl enable promtail && systemctl start promtail'"
      when: skip_monitoring is not defined or not skip_monitoring
      ignore_errors: yes
      
    - name: Distribute SSH keys to new container
      shell: |
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'mkdir -p /root/.ssh && chmod 700 /root/.ssh'"
        ssh {{ proxmox_host }} "pct exec {{ container_ctid }} -- bash -c 'echo \"{{ ssh_pubkey | default('ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGBIz9OJnufp1AteqlHjrsia+nl9roQGyccZWQccRzHY cory@homelab') }}\" >> /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys && sort -u /root/.ssh/authorized_keys -o /root/.ssh/authorized_keys'"
      ignore_errors: yes

    - name: Configure Proxmox backup
      shell: |
        ssh {{ proxmox_host }} "pvesh create /cluster/backup --vmid {{ container_ctid }} \
          --storage truenas-backups \
          --schedule 'daily' \
          --compress zstd \
          --mode snapshot \
          --enabled 1"
      when: skip_backup is not defined or not skip_backup
      ignore_errors: yes
      
    - name: Display Wix DNS CNAME instruction
      debug:
        msg:
          - "=== Manual Wix DNS Configuration Required ==="
          - "Please create CNAME record in Wix DNS:"
          - "  Subdomain: {{ container_domain.split('.')[0] }}"
          - "  Points to: cloudigan.net"
          - "  Example: {{ container_domain }} -> cloudigan.net"
      when: 
        - container_domain is defined
        - container_domain.endswith('.cloudigan.net')
        - skip_wix_dns is not defined or not skip_wix_dns
      ignore_errors: yes
      register: wix_dns_result
    
    - name: Display deployment summary
      debug:
        msg:
          - "=== Deployment Complete ==="
          - "Container: {{ container_name }} (CT{{ container_ctid }})"
          - "IP Address: {{ container_ip }}"
          - "Status: Running"
          - "Netbox: {{ 'Created' if (netbox_create is defined and netbox_create.status is defined and netbox_create.status == 201) else ('Updated' if (netbox_update is defined and netbox_update.status is defined and netbox_update.status == 200) else 'Skipped/Failed') }}"
          - "NPM Proxy: {{ 'Created' if (npm_create is defined and npm_create.status is defined and npm_create.status == 201) else ('Updated' if (npm_update is defined and npm_update.status is defined and npm_update.status == 200) else 'Skipped/Failed') }}"
          - "DNS (Internal): {{ 'Configured' if (skip_dns is not defined or not skip_dns) else 'Skipped' }}"
          - "DNS (Wix): Manual configuration required"
          - "Monitoring: {{ 'Installed (node_exporter + promtail)' if (skip_monitoring is not defined or not skip_monitoring) else 'Skipped' }}"
          - "Backup: {{ 'Configured' if (skip_backup is not defined or not skip_backup) else 'Skipped' }}"
          - ""
          - "Access container: ssh root@{{ container_ip }}"
          - "{% if container_domain is defined %}Web UI: http://{{ container_domain }}{% endif %}"

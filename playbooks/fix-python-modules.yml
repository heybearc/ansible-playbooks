---
- name: Fix Python Modules - Install python3-six on affected hosts
  hosts: theoshift-green,quantshift-blue,quantshift-green,postgresql-primary,postgresql-replica,monitoring-stack
  become: yes
  gather_facts: no
  
  tasks:
    - name: Install python3 and python3-six using raw commands
      raw: apt-get update && apt-get install -y python3 python3-six
      register: install_result
      changed_when: "'Setting up' in install_result.stdout"
      
    - name: Verify Python installation
      raw: python3 --version
      register: python_version
      changed_when: false
      
    - name: Verify six module installation
      raw: python3 -c "import six; print('six version:', six.__version__)"
      register: six_version
      changed_when: false
      
    - name: Display results
      debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Python: {{ python_version.stdout_lines[0] }}"
          - "Six: {{ six_version.stdout_lines[0] }}"

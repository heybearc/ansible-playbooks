---
- name: Sync Semaphore Templates - Auto-create templates from playbooks
  hosts: localhost
  connection: local
  gather_facts: no
  
  vars:
    semaphore_url: "{{ semaphore_url | default('https://ansible.cloudigan.net') }}"
    semaphore_user: "{{ semaphore_user | default('admin') }}"
    semaphore_password: "{{ semaphore_password | default('') }}"
    semaphore_project_id: "{{ semaphore_project_id | default('1') }}"
    github_repo: "heybearc/ansible-playbooks"
    
  tasks:
    - name: Verify required variables are set
      assert:
        that:
          - semaphore_password is defined
          - semaphore_password | length > 0
        fail_msg: "SEMAPHORE_PASSWORD environment variable must be set"
        
    - name: Install required Python packages
      pip:
        name:
          - requests
          - PyYAML
        state: present
      become: yes
      
    - name: Get repository root directory
      command: git rev-parse --show-toplevel
      register: repo_root
      changed_when: false
      
    - name: Set script path
      set_fact:
        script_path: "{{ repo_root.stdout }}/scripts/semaphore-auto-template.py"
        
    - name: Fetch playbooks from GitHub
      uri:
        url: "https://api.github.com/repos/{{ github_repo }}/contents/playbooks"
        return_content: yes
      register: github_playbooks
      
    - name: Display discovered playbooks
      debug:
        msg: "Found {{ github_playbooks.json | selectattr('name', 'match', '.*\\.ya?ml$') | list | length }} playbooks in repository"
        
    - name: Run template generator script
      command:
        cmd: python3 {{ script_path }}
      environment:
        SEMAPHORE_URL: "{{ semaphore_url }}"
        SEMAPHORE_USER: "{{ semaphore_user }}"
        SEMAPHORE_PASSWORD: "{{ semaphore_password }}"
        SEMAPHORE_PROJECT_ID: "{{ semaphore_project_id }}"
      register: sync_result
      changed_when: "'Created:' in sync_result.stdout and sync_result.stdout is search('Created: [1-9]')"
      
    - name: Display sync results
      debug:
        msg: "{{ sync_result.stdout_lines }}"
        
    - name: Summary
      debug:
        msg:
          - "✅ Template sync complete"
          - "Check Semaphore UI for new templates"
          - "URL: {{ semaphore_url }}/project/{{ semaphore_project_id }}/templates"
